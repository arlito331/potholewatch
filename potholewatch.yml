name: PotholeWatch Phase 3

on:
  schedule:
    - cron: '0 */8 * * *'   # Every 8 hours: 00:00, 08:00, 16:00 UTC
    - cron: '0 8 * * 1'     # Every Monday 8am UTC — weekly Excel report
  workflow_dispatch:
    inputs:
      weekly_report:
        description: 'Include weekly Excel report?'
        required: false
        default: 'false'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PotholeWatch Phase 3
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_REFRESH_TOKEN:    ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_CLIENT_ID:        ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET:    ${{ secrets.GMAIL_CLIENT_SECRET }}
          GOOGLE_MAPS_API_KEY:    ${{ secrets.GOOGLE_MAPS_API_KEY }}
          WEEKLY_REPORT:          ${{ github.event.inputs.weekly_report || (github.event.schedule == '0 8 * * 1' && 'true' || 'false') }}
        run: python potholewatch.py
