name: PotholeWatch v3

on:
  schedule:
    - cron: '0 */8 * * *'    # every 8 hours
  workflow_dispatch:

permissions:
  contents: write             # needed to commit incidents.json back

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run scan
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_MAPS_API_KEY:  ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GMAIL_CLIENT_ID:      ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET:  ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN:  ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: python potholewatch_v3.py

      - name: Commit inventory updates
        run: |
          git config user.name  "potholewatch-bot"
          git config user.email "bot@potholewatch.local"
          git add incidents.json || true
          git diff --cached --quiet || git commit -m "PotholeWatch inventory update [skip ci]"
          git push || true
